# SonarQube project definition
sonar.projectKey=notes-app
sonar.projectName=Notes App
sonar.host.url=http://localhost:9000

# Authentication
# Use a secure token by setting SONAR_TOKEN in your environment.
sonar.token=${env.SONAR_TOKEN}

# If you do not have a token, generate one in SonarQube under your user account.
# Remove the following login/password values once you are using SONAR_TOKEN.
# sonar.login=admin
# sonar.password=Sonarqube@1234

sonar.sources=backend/src,frontend/src
sonar.tests=backend/src/test,frontend/src
sonar.test.inclusions=**/*.test.js
sonar.exclusions=**/node_modules/**,**/build/**,**/*.test.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/lcov.info