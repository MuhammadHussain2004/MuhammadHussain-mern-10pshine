sonar.projectKey=MuhammadHussain-mern-10pshine
sonar.projectName=MERN Internship Project
sonar.projectVersion=1.0

# Server URL (uncomment if using local SonarQube server instead of SonarCloud)
sonar.host.url=http://localhost:9000

# Path to the source directories
sonar.sources=backend/src,frontend/src

# File encoding
sonar.sourceEncoding=UTF-8

# Exclude unnecessary files and folders from analysis
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/coverage/**,**/*.test.js,**/*.spec.js,frontend/public/**

# (Optional) Path to test directories if you want to analyze tests
# sonar.tests=backend/tests,frontend/src
# sonar.test.inclusions=**/*.test.js,**/*.spec.js

# (Optional) Paths to test coverage reports (if you are generating them with tools like Jest)
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
